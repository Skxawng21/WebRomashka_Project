<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"/>
    <title>Практическая работа №27</title>
</head>
<body>
    <!-- ШАПКА -->
    <header>
        <div class="location">
            <h2>Аналитика рынка</h2>
        </div>
    </header>
    <section class="infographics">
    <div class="infographics-grid">
        
        <!-- Круговая диаграмма  -->
        <div class="card-chart">
            <h3>Типы жилья</h3>
            <div class="pie-chart">
                <div class="pie-segment"></div>
            </div>
            <div class="legend">
                <span><span style="background:#2563EB;"></span> Квартиры (55%)</span>
                <span><span style="background:#F59E0B;"></span> Дома (25%)</span>
                <span><span style="background:#10B981;"></span> Студии (20%)</span>
            </div>
        </div>

        <!--График динамики цен-->
        <div class="card-chart">
            <h3>Динамика цен <span class="trend-up">▲ 5%</span></h3>
            <div class="line-chart">
                <div class="chart-bars">
                    <div class="bar-wrapper"><div class="bar" style="height: 40px;"></div><span>Янв</span></div>
                    <div class="bar-wrapper"><div class="bar" style="height: 45px;"></div><span>Фев</span></div>
                    <div class="bar-wrapper"><div class="bar" style="height: 48px;"></div><span>Мар</span></div>
                    <div class="bar-wrapper"><div class="bar" style="height: 8px;"></div><span>апр</span></div>
                </div>
            </div>
            <p class="chart-note">Средняя цена ₽/мес: +12% за квартал</p>
        </div>

        <!-- Ключевая метрика -->
        <div class="card-metric">
            <div class="metric-value">
                <span class="metric-number">89 500 ₽</span>
                <span class="metric-label">Средняя цена</span>
            </div>
            <div class="metric-value">
                <span class="metric-number">128</span>
                <span class="metric-label">Активных объектов</span>
            </div>
            <div class="rating-stars">
                <span>★★★★★</span>
                <span class="rating-text">4.8 (Рейтинг аренды)</span>
            </div>
        </div>
    </div>
</section>

    
    <footer>
        <div class="block-menu">
            <a href="main.html">
                <img src="img/home.png">
                <p>Главаня</p>
            </a>
        </div>
        <div class="block-menu">
            <a href="like.html">
                <img src="img/like.png">
                <p>Избраное</p>
            </a>
        </div>
        <div class="block-menu">
            <a href="profile.html">
                <img src="img/profile1.png">
                <p class="active-list">Профиль</p>
            </a>
        </div>
    </footer>
</body>
