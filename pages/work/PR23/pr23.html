<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"/>
    <title>Практическая работа №23</title>
</head>
<body>
    <header>
        <div class="header-angelina">
            <h2>ANGELA</h2>
        </div>
        <div class="header-menu">
            <div></div> 
        </div>
    </header>

    <main>
        <section class="profille">
            <div class="foto-name">
                <div class="Angelina">
                    <div class="soo"></div>
                </div>
                <div class="Angelina-info">
                    <h2>Angelna</h2>
                    <p>Texas USA</p>
                    <button>
                        <div class="button-img"></div>
                        Join me
                    </button>
                </div>
            </div>

            <div class="statistick">
                <div class="info-block ib1">
                    <h3>1502</h3>
                    <p>FOLLOWERS</p>
                </div>
                <div class="info-block ib1">
                    <h3>2050</h3>
                    <p>FRIENDS IN</p>
                </div>
                <div class="info-block">
                    <h3>205005</h3>
                    <p>PROFILE VIEWS</p>
                </div>
            </div>
        </section>

        <section class="post">
            <div class="post-block">
                <div class="post-profille">
                    <div class="post-profille-img"></div>
                    <div class="profille-info">
                        <p class="Name">Angelina</p>
                        <p class="Time">2 Second ago</p>
                    </div>
                    <div class="settings">
                        <img src="img/5.png">
                    </div>
                </div>
                <p class="post-txt">Lorem ipsum dolor sit, amet consectetur adipisicing elit. Facere similique ullam soluta, blanditiis accusantium autem!</p>
                <div class="statistick">
                    <div class="statistick-like">
                        <img src="img/6.png">
                        <span>4 Likes</span>
                    </div>
                    <div class="statistick-commit">
                        <img src="img/4.png">
                        <span>1 Comment</span>
                    </div>
                </div>

                <div class="Comment">
                    <div class="input-box">
                        <input type="text">
                    </div>
                    <button class="OK">
                        OK
                    </button>
                </div>
            </div>
        </section>
    </main>
</body>
